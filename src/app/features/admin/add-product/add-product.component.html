<section class="page-card">
  <div class="page-heading">
    <p class="eyebrow">Admin Panel</p>
    <h2>เพิ่มสินค้าใหม่</h2>
    <p>ระบุข้อมูลสินค้าให้ครบถ้วนเพื่อบันทึกลงระบบ</p>
  </div>

  <div *ngIf="message" [style.color]="isSuccess ? '#16a34a' : '#dc2626'" style="margin-top: 14px; font-weight: 600;">
    {{ message }}
  </div>

  <form (ngSubmit)="productForm.form.valid && submit()" #productForm="ngForm" class="history-list">
    
    <div class="history-card layout-field">
      <div>
        <strong>ชื่อสินค้า (Product Name) *</strong>
        <input type="text" name="name" [(ngModel)]="product.name" required placeholder="เช่น ชานมไข่มุก" class="form-input" />
      </div>
    </div>

    <div class="history-card layout-field">
      <div>
        <strong>รายละเอียดสินค้า (Description) *</strong>
        <input type="text" name="description" [(ngModel)]="product.description" required placeholder="เช่น หวานน้อย ไข่มุกหนึบ" class="form-input" />
      </div>
    </div>

    <div class="history-card layout-field">
      <div>
        <strong>ร้านค้า / ร้านอาหาร (Restaurant) *</strong>
        <input type="text" name="restaurant" [(ngModel)]="product.restaurant" required placeholder="เช่น ป้าแช่มตามสั่ง" class="form-input" />
      </div>
    </div>

    <div class="history-card split-row">
      <div class="history-card layout-field half">
        <div>
          <strong>ราคา (Price / THB) *</strong>
          <input type="number" name="price" [(ngModel)]="product.price" required min="0" class="form-input" />
        </div>
      </div>

      <div class="history-card layout-field half">
        <div>
          <strong>จำนวนคงเหลือ (Quantity) *</strong>
          <input type="number" name="quantity" [(ngModel)]="product.quantity" required min="0" class="form-input" />
        </div>
      </div>
    </div>

    <div class="history-card layout-field">
      <div>
        <strong>ประเภทสินค้า (Category Type) *</strong>
        <select name="type" [(ngModel)]="product.type" class="form-input select-box">
          <option [ngValue]="0">Food (อาหาร)</option>
          <option [ngValue]="1">Beverage (เครื่องดื่ม)</option>
        </select>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" routerLink="/admin/items" class="btn-cancel">ยกเลิก</button>
      <button type="submit" [disabled]="productForm.invalid" class="btn-submit">บันทึกสินค้า</button>
    </div>

  </form>
</section>
