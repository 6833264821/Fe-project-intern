<div class="flex justify-content-center align-items-center min-h-screen">
  <p-card styleClass="w-30rem surface-card">

    <h2 class="mt-0 mb-4 font-semibold">Create account</h2>

    <!-- Full name -->
    <div class="flex flex-column gap-2 mb-4">
      <label for="fullName">Full name</label>
      <input pInputText id="fullName" [(ngModel)]="form.fullName"
             name="fullName" placeholder="John Doe" class="w-full" />
    </div>

    <!-- Email -->
    <div class="flex flex-column gap-2 mb-4">
      <label for="email">Email</label>
      <input pInputText id="email" [(ngModel)]="form.email"
             name="email" type="email" placeholder="john@example.com" class="w-full" />
    </div>

    <!-- Phone -->
    <div class="flex flex-column gap-2 mb-4">
      <label for="tel">Phone</label>
      <input pInputText id="tel" [(ngModel)]="form.tel"
             name="tel" type="tel" placeholder="0812345678" class="w-full" />
    </div>

    <!-- Password -->
    <div class="flex flex-column gap-2 mb-4">
      <label for="password">Password</label>
      <p-password id="password" [(ngModel)]="form.password"
                  name="password" placeholder="Min 8 characters"
                  [feedback]="false" [toggleMask]="true"
                  styleClass="w-full" inputStyleClass="w-full" />
    </div>

    <!-- Role selector -->
    <div class="flex flex-column gap-2 mb-4">
      <label>Register as</label>
      <div class="flex gap-2">
        <p-button label="User" icon="pi pi-user"
          [outlined]="role !== 'User'"
          styleClass="role-toggle w-full"
          [ngClass]="{ 'role-active': role === 'User' }"
          (onClick)="selectRole('User')" />

        <p-button label="Admin" icon="pi pi-shield"
          [outlined]="role !== 'Admin'"
          styleClass="role-toggle w-full"
          [ngClass]="{ 'role-active': role === 'Admin' }"
          (onClick)="selectRole('Admin')" />
      </div>
    </div>

    <!-- Admin secret key -->
    @if (role === 'Admin') {
      <div class="flex flex-column gap-2 mb-4">
        <label for="adminKey">Admin secret key</label>
        <p-password id="adminKey" [(ngModel)]="adminSecretKey"
                    name="adminSecretKey" placeholder="Admin secret key"
                    [feedback]="false" [toggleMask]="true"
                    styleClass="w-full" inputStyleClass="w-full" />
      </div>
    }

    <!-- Submit -->
    <p-button label="Register" styleClass="w-full"
      [style]="{ 'background-color': '#b91c1c', 'border-color': '#b91c1c', 'color': '#ffffff' }"
      (onClick)="submit()" />

    <!-- Message -->
    @if (message) {
      <p-message class="mt-3 w-full"
                 [severity]="isSuccess ? 'success' : 'error'"
                 [text]="message" />
    }

  </p-card>
</div>
