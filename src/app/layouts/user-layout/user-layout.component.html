<link
  href="https://fonts.googleapis.com/icon?family=Material+Icons"
  rel="stylesheet"
/>
<div class="layout-shell user-shell">
  <header class="layout-header">
    <div class="brand">
      <div class="brand-mark">U</div>
      <div>
        <p>Customer</p>
        <h1>User Area</h1>
      </div>
    </div>

    <a routerLink="/cart" routerLinkActive="active" class="cart-link">
      <span class="material-icons">shopping_cart</span>
      @if ((cartService.cartCount$ | async) ?? 0; as count) {
        @if (count > 0) {
          <span class="cart-badge">{{ count }}</span>
        }
      }
    </a>

    <nav class="layout-nav">
      <a routerLink="/shop" routerLinkActive="active">Shop</a>
      <a routerLink="/history-buy" routerLinkActive="active">History Buy</a>
      <button type="button" class="link-button" (click)="logout()">
        Logout
      </button>
    </nav>
  </header>

  <main class="layout-content">
    <router-outlet />
  </main>
</div>
